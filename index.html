{% extends "base.html" %}


{% block content %}
   <div class="card">
      <h1> Michael Aguirre </h1>
    <h2>Sign In</h2>

    <form style="text-align: center;" method="POST" action="/sign_in">
        <input type="email" name="email" placeholder="Email" autocomplete="off" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>

   <button onclick="showMessage()" class="btn btn-primary">Click Me</button>

<p id="dynamicText">This is original text</p>
<button onclick="changeText()" class="btn btn-warning">Change Text</button>

<button onclick="toggleDarkMode()" class="btn btn-dark">Toggle Dark Mode</button>
    {% if error %}
        <p style="color:red; text-align: center;">{{ error }}</p>
    {% endif %}
      <script src="js/script.js"></script>
   </div>
{% endblock %}
